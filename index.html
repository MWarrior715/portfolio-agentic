<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Manuel Guerrero — AI Product Builder & Systems Integrator. Portafolio de orquestación agéntica, proyectos de IA y el caso QUIKLII."
    />
    <title>Manuel Guerrero · AI Product Builder</title>
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <script>
      // Anti-FOUC: aplica la clase .dark antes del primer pintado,
      // leyendo la misma key que usa useThemeStore (Zustand persist).
      (function () {
        try {
          var stored = localStorage.getItem('portfolio-agentic-theme');
          var isDark = true;
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.state && typeof parsed.state.isDark === 'boolean') {
              isDark = parsed.state.isDark;
            }
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
